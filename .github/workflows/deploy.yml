name: Deployment

on:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v1

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx turbo run db:generate

      # --- STAGING DEPLOYMENT ---
      - name: Build Staging
        if: github.ref == 'refs/heads/develop'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_CONFIG_STG_TOKEN }}
        run: doppler run --config stg -- npx turbo run build

      - name: Deploy API to Railway (Staging)
        if: github.ref == 'refs/heads/develop'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STG_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --service api --detach --ci

      - name: Deploy Web to Vercel (Staging)
        if: github.ref == 'refs/heads/develop'
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          zeit-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web
          alias-domains: |
            staging.yourdomain.com

      # --- PRODUCTION DEPLOYMENT ---
      - name: Build Production
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_CONFIG_PRD_TOKEN }}
        run: doppler run --config prd -- npx turbo run build

      - name: Deploy API to Railway (Production)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRD_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --service api --detach --ci

      - name: Deploy Web to Vercel (Production)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          zeit-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web
          vercel-args: '--prod'

      - name: Notify Success
        if: success()
        run: echo "Build and Deployment successful for ${{ github.ref_name }}"
