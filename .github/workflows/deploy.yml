name: Deployment

on:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v1

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx turbo run db:generate

      # --- STAGING DEPLOYMENT ---
      - name: Build Staging
        if: github.ref == 'refs/heads/develop'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_CONFIG_STG_TOKEN }}
        run: doppler run --config stg -- npx turbo run build

      - name: Deploy API to Railway (Staging)
        if: github.ref == 'refs/heads/develop'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STG_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --service api --detach --ci

      - name: Deploy Web to Vercel (Staging)
        if: github.ref == 'refs/heads/develop'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_CONFIG_STG_TOKEN }}
        run: |
          npx vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
          doppler run --config stg -- npx vercel build --token=$VERCEL_TOKEN
          npx vercel deploy --prebuilt --token=$VERCEL_TOKEN

      - name: Sync Production Secrets
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_CONFIG_PRD_TOKEN }}
        run: |
          doppler secrets set NEXT_PUBLIC_API_BASE_URL=https://api-production.up.railway.app/api
          doppler secrets set NEXT_PUBLIC_SOCKET_URL=https://api-production.up.railway.app

      - name: Build Production
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_CONFIG_PRD_TOKEN }}
        run: doppler run --config prd -- npx turbo run build

      - name: Deploy API to Railway (Production)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRD_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --service api --detach --ci

      - name: Deploy Web to Vercel (Production)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_CONFIG_PRD_TOKEN }}
        run: |
          npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          doppler run --config prd -- npx vercel build --prod --token=$VERCEL_TOKEN
          npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: Notify Success
        if: success()
        run: echo "Build and Deployment successful for ${{ github.ref_name }}"
