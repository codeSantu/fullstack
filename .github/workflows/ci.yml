name: CI/CD Pipeline (Yarn)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      RAILWAY_API_KEY: ${{ secrets.RAILWAY_API_KEY }}

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v4

      # 2️⃣ Setup Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      # 3️⃣ Enable Corepack & Yarn v3
      - name: Enable Corepack & Yarn
        run: |
          corepack enable
          corepack prepare yarn@3.6.0 --activate
          yarn --version

      # 4️⃣ Install dependencies
      - name: Install dependencies
        run: yarn install --immutable

      # 5️⃣ Generate Prisma client for API
      - name: Generate Prisma Client
        run: npx turbo run db:generate --filter=api

      # 6️⃣ Build all packages
      - name: Build packages
        run: npx turbo run build

      # 7️⃣ Run type checks
      - name: Type Check
        run: npx turbo run check

      # 8️⃣ Deploy frontend to Netlify
      - name: Deploy Web to Netlify
        run: |
          yarn workspace web build
          netlify deploy --prod --dir=apps/web/out

      # 9️⃣ Deploy backend/API to Railway
      - name: Deploy API to Railway
        run: |
          curl -sSL https://cli.railway.app/install.sh | sh
          railway login --apiKey $RAILWAY_API_KEY
          railway up --service api