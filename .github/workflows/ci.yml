name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 🔹 Upgrade npm to match package.json engines (fix EBADENGINE)
      - name: Upgrade npm to v11+
        run: npm install -g npm@11

      # 🔹 Install dependencies skipping optional platform-specific packages
      - name: Install dependencies
        run: npm ci --omit=optional --prefer-offline --no-audit

      # Generate Prisma client
      - name: Generate Prisma Client
        run: npx turbo run db:generate --filter=api

      # Build all packages first
      - name: Build packages
        run: npx turbo run build

      # Then run type checks
      - name: Type Check
        run: npx turbo run check