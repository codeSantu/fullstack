name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # Setup Node.js **and npm v11+ at the same time**
      - name: Setup Node.js with correct npm
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          check-latest: true

      # Force npm to the correct version in case setup-node didn’t
      - name: Upgrade npm if needed
        run: |
          npm install -g npm@11
          echo "Using npm version: $(npm --version)"

      # Install dependencies, skip optional Android ARM package
      - name: Install dependencies
        run: npm ci --omit=optional --prefer-offline --no-audit

      # Generate Prisma client
      - name: Generate Prisma Client
        run: npx turbo run db:generate --filter=api

      # Build all packages
      - name: Build packages
        run: npx turbo run build

      # Type checks
      - name: Type Check
        run: npx turbo run check