name: CI/CD Pipeline (Yarn v3)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      RAILWAY_API_KEY: ${{ secrets.RAILWAY_API_KEY }}

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v4

      # 2️⃣ Setup Node.js 20
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Enable Corepack & Yarn v3
      - name: Enable Corepack & Yarn v3
        run: |
          corepack enable
          corepack prepare yarn@3.6.0 --activate
          yarn --version

      # 4️⃣ Cache Yarn v3 dependencies
      - name: Cache Yarn v3 Dependencies
        uses: actions/cache@v3
        with:
          path: |
            **/node_modules
            **/.yarn/cache
            **/.yarn/unplugged
            **/.yarn/build-state.yml
          key: yarn-v3-${{ hashFiles('**/yarn.lock') }}

      # 5️⃣ Cache Turbo outputs including Prisma client
      - name: Cache Turbo Output
        uses: actions/cache@v3
        with:
          path: |
            .turbo
            node_modules/.cache/turbo
            apps/api/node_modules/@prisma/client
          key: turbo-${{ github.sha }}
          restore-keys: |
            turbo-

      # 6️⃣ Clean previous builds
      - name: Clean previous builds
        run: |
          rm -rf node_modules
          yarn dlx turbo prune --force

      # 7️⃣ Install dependencies
      - name: Install dependencies
        run: yarn install --immutable

      # 8️⃣ Generate Prisma client for API
      - name: Generate Prisma Client
        run: yarn dlx turbo run db:generate --filter=api

      # 9️⃣ Build all packages
      - name: Build packages
        run: yarn dlx turbo run build

      # 🔟 Run type checks
      - name: Type Check
        run: yarn dlx turbo run check

      # 1️⃣1️⃣ Deploy frontend to Netlify
      - name: Deploy Web to Netlify
        run: |
          yarn workspace web build
          npx netlify deploy --prod --dir=apps/web/out

      # 1️⃣2️⃣ Deploy backend/API to Railway
      - name: Deploy API to Railway
        run: |
          curl -sSL https://cli.railway.app/install.sh | sh
          railway login --apiKey $RAILWAY_API_KEY
          railway up --service api