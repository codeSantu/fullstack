name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Upgrade npm to 11+
      - name: Upgrade npm
        run: |
          npm install -g npm@11
          npm --version

      # Enable Corepack & Yarn 3
      - name: Enable Corepack & Yarn
        run: |
          corepack enable
          corepack prepare yarn@3.6.0 --activate
          yarn --version

      # Install dependencies
      - name: Install dependencies
        run: yarn install --immutable

      # Generate Prisma client
      - name: Generate Prisma Client
        run: npx turbo run db:generate --filter=api

      # Build all packages
      - name: Build packages
        run: npx turbo run build

      # Type check
      - name: Type Check
        run: npx turbo run check

      # Deploy frontend to Netlify
      - name: Deploy Web to Netlify
        run: |
          npx netlify deploy --dir=apps/web/out --prod --site=$NETLIFY_SITE_ID

      # Deploy backend to Railway
      - name: Deploy API to Railway
        run: |
          curl -sSL https://cli.railway.app/install.sh | sh
          railway login --apiKey ${{ secrets.RAILWAY_API_KEY }}
          railway up --service api