# nixpacks.toml - API build setup

[phases.setup]
# Added yarn-berry here, removed corepack from install cmds
nixPkgs = ["nodejs_22", "yarn-berry", "python310", "gnumake", "gcc"]

[env]
npm_config_build_from_source = "false"

[phases.install]
cmds = [
  # yarn-berry automatically respects your project's .yarnrc.yml 
  # and yarn.lock, so you don't need to manually set the version here.
  "yarn install --immutable"
]

[phases.build]
cmds = [
  "yarn turbo run db:generate --filter=api",
  "yarn turbo run build --filter=api"
]

[start]
cmd = "node apps/api/dist/src/main.js"