# Use Node.js 20
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
    "corepack enable",
    "corepack prepare yarn@3.6.0 --activate",
    "yarn install --immutable"
]

[phases.build]
cmds = [
    "yarn turbo run db:generate --filter=api",
    "yarn turbo run build --filter=api"
]

[start]
cmd = "node apps/api/dist/src/main.js"