# nixpacks.toml - API build setup

[phases.setup]
# Declare all system dependencies here
nixPkgs = ["nodejs_22_12", "python310", "gnumake", "gcc"]

[env]
npm_config_build_from_source = "false"

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare yarn@3.6.0 --activate",
  "yarn install --immutable"
]

[phases.build]
cmds = [
  "yarn turbo run db:generate --filter=api",
  "yarn turbo run build --filter=api"
]

[start]
cmd = "node apps/api/dist/src/main.js"